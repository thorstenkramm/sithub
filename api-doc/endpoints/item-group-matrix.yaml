get:
  summary: Get weekly desk matrix for item groups
  description: >
    Returns a desk-level weekly matrix for all item groups in an area.
    Each resource represents one item group, containing per-item rows with
    per-day booking cells. Used by the frontend table view.
  operationId: getItemGroupMatrix
  tags:
    - Item Groups
  parameters:
    - name: area_id
      in: path
      required: true
      schema:
        type: string
      example: "office_1st_floor"
    - name: week
      in: query
      required: false
      description: >
        ISO 8601 week in YYYY-Www format (e.g. 2026-W12).
        Defaults to the current week if omitted.
      schema:
        type: string
        pattern: '^\d{4}-W\d{2}$'
      example: "2026-W12"
    - name: days
      in: query
      required: false
      description: >
        Number of visible days. Use 5 for weekdays only (default)
        or 7 to include Saturday and Sunday.
      schema:
        type: integer
        enum:
          - 5
          - 7
        default: 5
      example: 5
  responses:
    "200":
      description: Weekly desk matrix per item group
      content:
        application/vnd.api+json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/ItemGroupMatrixCollectionResponse"
    "400":
      description: Invalid week parameter
      content:
        application/vnd.api+json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
    "401":
      description: Unauthorized
      content:
        application/vnd.api+json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
    "404":
      description: Area not found
      content:
        application/vnd.api+json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
