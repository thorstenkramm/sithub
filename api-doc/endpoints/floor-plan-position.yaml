put:
  summary: Update floor plan position
  description: Updates an existing positioned rectangle. Admin only.
  operationId: updateFloorPlanPosition
  tags:
    - Floor Plans
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/vnd.api+json:
        schema:
          $ref: ../openapi.yaml#/components/schemas/FloorPlanPositionUpdateRequest
  responses:
    '200':
      description: Position updated
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/FloorPlanPositionSingleResponse
    '400':
      description: Invalid request
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ErrorResponse
    '401':
      description: Unauthorized
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ErrorResponse
    '403':
      description: Admin role required
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ErrorResponse
    '404':
      description: Position not found
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ErrorResponse

delete:
  summary: Delete floor plan position
  description: Removes a positioned rectangle from a floor plan. Admin only.
  operationId: deleteFloorPlanPosition
  tags:
    - Floor Plans
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Position deleted
    '401':
      description: Unauthorized
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ErrorResponse
    '403':
      description: Admin role required
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ErrorResponse
    '404':
      description: Position not found
      content:
        application/vnd.api+json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ErrorResponse
