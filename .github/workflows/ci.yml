name: CI

on:
  push:
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Persist the Trivy vulnerability DB across runs. The unique key forces a
      # fresh save each run while restore-keys recovers the most recent DB, so a
      # download only happens when the cached DB is missing or stale.
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.trivycache
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-

      - name: Prepare Trivy cache dir
        run: mkdir -p "${{ github.workspace }}/.trivycache"

      # First scan: may update the DB into the shared cache dir (/cache is a
      # separate mount so it stays out of the scanned tree).
      - name: Trivy scan — frontend (npm dependencies)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/.trivycache:/cache" \
            -w /src \
            aquasec/trivy:0.69.3 fs \
            --cache-dir /cache \
            --scanners vuln \
            --skip-dirs web/node_modules \
            --include-dev-deps --exit-code 1 --skip-version-check \
            /src/web

      # Second scan: reuses the DB downloaded above (--skip-db-update), so the
      # database is never downloaded twice.
      - name: Trivy scan — backend (Go modules + secrets)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/.trivycache:/cache" \
            -w /src \
            aquasec/trivy:0.69.3 fs \
            --cache-dir /cache \
            --skip-db-update \
            --scanners vuln,secret \
            --skip-dirs web --skip-dirs .codex --skip-dirs private \
            --include-dev-deps --exit-code 1 --skip-version-check \
            /src

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        working-directory: web
        run: npm ci

      - name: Security audit (npm)
        working-directory: web
        run: npm audit --audit-level=high

      - name: Frontend type-check
        working-directory: web
        run: npm run type-check

      - name: Frontend lint
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m ./...

      - name: Go tests (race + coverage)
        run: |
          packages=$(go list ./... | grep -v /web/node_modules/)
          go test -race -covermode=atomic -coverprofile=coverage.out $packages
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          pct=${total%\%}
          echo "Go coverage: ${pct}%"
          awk -v pct="$pct" 'BEGIN {exit !(pct >= 80)}'

      - name: Markdown lint
        run: npx --yes markdownlint-cli README.md

      - name: API doc lint
        run: npx @redocly/cli lint --lint-config off ./api-doc/openapi.yaml

      - name: Code duplication (Go)
        run: npx jscpd --pattern "**/*.go" --ignore "**/*_test.go,**/node_modules/**" --threshold 3

      - name: Code duplication (frontend)
        working-directory: web
        run: npx jscpd --pattern "**/*.ts" --ignore "**/node_modules/**,**/*.test.ts" --threshold 0 --exit-code 1

      - name: Frontend unit tests (coverage)
        working-directory: web
        run: npm run test:unit:coverage

      - name: Build Go binary for E2E tests
        run: go build -o ./sithub ./cmd/sithub

      - name: Create test config
        run: |
          cat > .sithub-test-areas.yaml <<EOF
          areas:
            - id: test_area
              name: "Test Area"
              items:
                - id: test_room
                  name: "Test Room"
                  items:
                    - id: desk_1
                      name: "Desk 1"
                      equipment: [Monitor, Keyboard]
                    - id: desk_2
                      name: "Desk 2"
                      equipment: [Monitor]
          EOF

          cat > .sithub-test.toml <<EOF
          [main]
          port = 8080
          listen = "127.0.0.1"

          [log]
          file = "-"
          level = "info"

          [areas]
          config_file = "${{ github.workspace }}/.sithub-test-areas.yaml"
          EOF

      - name: Start server and seed demo users
        run: |
          ./sithub run --config ./.sithub-test.toml &
          echo $! > /tmp/sithub.pid
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8080/health >/dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done
          # Seed demo users into the database
          sqlite3 sithub.db < tools/database/demo-users.sql

      - name: Cypress E2E tests
        working-directory: web
        run: npx cypress run --browser electron --config baseUrl=http://localhost:8080 --env testUserEmail=anna@sithub.local,testUserPassword=SitHubDemo2026!!

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/sithub.pid ]; then
            kill $(cat /tmp/sithub.pid) 2>/dev/null || true
          fi
