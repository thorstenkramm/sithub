version: 2

before:
  hooks:
    - test -f assets/web/index.html

builds:
  - main: ./cmd/sithub
    binary: sithub
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64

archives:
  - formats:
      - tar.gz
    files:
      - LICENSE
      - sithub.example.toml
      - sithub.service

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: thorstenkramm
    name: sithub
