    <path d="M65 182 C65 233 95 260 170 260 C245 260 275 233 275 182" stroke="white" stroke-width="28" stroke-linecap="round"/>
    <path d="M170 260 V320" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <path d="M122 320 H218" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <path d="M138 320 L108 350" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <path d="M202 320 L232 350" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="92" y="54" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="600" letter-spacing="-1">
    <tspan fill="#07122B">Sit</tspan><tspan fill="url(#hHubGrad)">Hub</tspan>
