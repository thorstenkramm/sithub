<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hIconGrad" x1="4" y1="4" x2="76" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82FF"/>
      <stop offset="1" stop-color="#3D4CFF"/>
    </linearGradient>
    <linearGradient id="hHubGrad" x1="170" y1="40" x2="300" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82FF"/>
      <stop offset="1" stop-color="#4F46E5"/>
