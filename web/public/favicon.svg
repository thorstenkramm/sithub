<svg width="64" height="64" viewBox="0 0 340 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Favicon derived from web/public/sithub_logo.svg. Reuses the icon
    background gradient and chair glyph from the full brand logo; the
    wordmark is stripped. ViewBox is 340x360 (10 px taller than the
    rounded-square background) so the chair feet stay fully visible.
  -->
  <defs>
    <linearGradient id="faviconGrad" x1="0" y1="0" x2="340" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82FF"/>
      <stop offset="1" stop-color="#3D4CFF"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="340" height="340" rx="78" fill="url(#faviconGrad)"/>

  <!-- Chair: coordinates copied from sithub_logo.svg, translated by (-430, -70) -->
  <rect x="110" y="68" width="120" height="120" rx="22" fill="white"/>
  <path d="M65 182 C65 233 95 260 170 260 C245 260 275 233 275 182" stroke="white" stroke-width="28" stroke-linecap="round" fill="none"/>
  <path d="M170 260 V320" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M122 320 H218" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M138 320 L108 350" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <path d="M202 320 L232 350" stroke="white" stroke-width="20" stroke-linecap="round"/>
</svg>
